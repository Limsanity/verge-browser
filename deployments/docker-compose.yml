services:
  api:
    image: python:3.11-slim
    working_dir: /workspace
    command: >
      sh -c "pip install -e .[dev] &&
             uvicorn app.main:app --app-dir apps/api-server --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ..:/workspace
      - /var/run/docker.sock:/var/run/docker.sock

